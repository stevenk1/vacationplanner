services:
  pocketbase:
    build: ./backend
    restart: unless-stopped
    environment:
      # First-run admin for the PocketBase dashboard (http://localhost:8090/_/)
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-admin@example.com}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-changeme123}
      # Server-side only: Google Places key for fetching place photos (optional, never sent to the browser)
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
      # Server-side only: Apify API token for importing Airbnb stays (optional, never sent to the browser)
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      # Optional S3-compatible object storage for uploaded photos (see .env.example)
      S3_ENABLED: ${S3_ENABLED:-false}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET: ${S3_SECRET:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    volumes:
      - pb_data:/pb/pb_data
    ports:
      - "${PB_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build: ./frontend
    restart: unless-stopped
    environment:
      # Public Mapbox token, injected into the SPA at runtime (no rebuild needed)
      MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    ports:
      - "${WEB_PORT:-31415}:80"
    depends_on:
      - pocketbase

volumes:
  pb_data:
